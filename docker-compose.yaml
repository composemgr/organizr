# nginx proxy address - http://172.17.0.1:8089

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  organizr:
    image: organizr/organizr:latest
    container_name: organizr-app
    restart: unless-stopped
    logging: *default-logging
    networks:
      - organizr
    ports:
      - "8089:8089"
    environment:
      TZ: ${TZ:-America/New_York}
      PUID: ${SERVICE_USER:-1000}
      PGID: ${SERVICE_GROUP:-1000}
    volumes:
      - ./volumes/config/organizr:/config
      - ./volumes/data/organizr:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8089"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  organizr:
    external: false
